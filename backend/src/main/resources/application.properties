# --------------------------------------
# Server Configuration
# --------------------------------------
server.port=8080
spring.application.name=toms
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# --------------------------------------
# PostgreSQL Configuration
# --------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/toms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:toms_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:toms@123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --------------------------------------
# Redis Configuration
# --------------------------------------
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
# Uncomment this if Redis requires a password
# spring.redis.password=your_redis_password

# --------------------------------------
# JPA and Hibernate Configuration
# --------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --------------------------------------
# Logging Configuration
# --------------------------------------
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.file.name=logs/toms.log

# --------------------------------------
# Kafka Configuration
# --------------------------------------
spring.kafka.consumer.group-id=toms-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=100
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.isolation.level=read_committed

# --------------------------------------
# JWT Configuration
# --------------------------------------
jwt.secret.key=${JWT_SECRET_KEY}

# --------------------------------------
# Mail Configuration
# --------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# --------------------------------------
# Kafka Security
# --------------------------------------
# Defaults to PLAINTEXT for local dev.
# Set KAFKA_SECURITY_PROTOCOL=SASL_SSL for production.
# KAFKA_SASL_MECHANISM=PLAIN
# KAFKA_SASL_USERNAME and KAFKA_SASL_PASSWORD must be set when using SASL.

# --------------------------------------
# Application Properties
# --------------------------------------
order.constraints.max-quantity=100
risk.limits.max-position=500
risk.limits.max-notional=50000
risk.limits.daily-loss-limit=5000

app.base-url=${APP_BASE_URL:http://localhost:8080}